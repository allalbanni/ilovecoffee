# Configuration File for Automated PDF Marking System
# Modify these settings to customize the application behavior

[OCR]
# Language for OCR (default: eng for English)
language = eng

# Tesseract path (Windows only - leave blank if in PATH)
tesseract_path = 

# DPI for PDF to image conversion (higher = better quality but slower)
dpi = 300

[MARKING]
# Default matching threshold (0-1)
default_threshold = 0.8

# Default marking mode (strict, flexible, keyword)
default_mode = flexible

# Ignore case sensitivity by default
ignore_case = true

[PDF]
# Page size for generated PDFs (letter, a4)
page_size = letter

# Include page numbers in output
include_page_numbers = true

# Compress output PDFs
compress_output = true

[UI]
# Application theme (light, dark)
theme = light

# Maximum file upload size in MB
max_file_size = 50

# Show detailed statistics
show_detailed_stats = true

[LOGGING]
# Enable debug logging
debug_mode = false

# Log file location
log_file = marking_system.log
